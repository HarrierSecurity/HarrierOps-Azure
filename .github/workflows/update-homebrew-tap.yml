name: update homebrew tap

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      version:
        description: Release tag, for example v1.0.1
        required: true
        type: string

permissions:
  contents: read

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve release version
        id: meta
        env:
          EVENT_NAME: ${{ github.event_name }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" = "release" ]; then
            version="$RELEASE_TAG"
          else
            version="$INPUT_VERSION"
          fi

          if [ -z "$version" ]; then
            echo "missing release version" >&2
            exit 1
          fi

          source_url="https://github.com/HarrierSecurity/HarrierOps-Azure/archive/refs/tags/${version}.tar.gz"

          curl -L --fail "$source_url" -o /tmp/ho-azure-source.tar.gz
          sha256="$(sha256sum /tmp/ho-azure-source.tar.gz | awk '{print $1}')"

          {
            echo "version=$version"
            echo "source_url=$source_url"
            echo "sha256=$sha256"
          } >> "$GITHUB_OUTPUT"

      - name: Dispatch tap update
        env:
          TOKEN: ${{ secrets.HOMEBREW_TAP_REPO_TOKEN }}
          VERSION: ${{ steps.meta.outputs.version }}
          SOURCE_URL: ${{ steps.meta.outputs.source_url }}
          SHA256: ${{ steps.meta.outputs.sha256 }}
        run: |
          set -euo pipefail
          if [ -z "$TOKEN" ]; then
            echo "missing secret HOMEBREW_TAP_REPO_TOKEN" >&2
            exit 1
          fi

          json_payload="$(cat <<EOF
          {
            "event_type": "ho_azure_release",
            "client_payload": {
              "version": "${VERSION}",
              "source_url": "${SOURCE_URL}",
              "sha256": "${SHA256}"
            }
          }
          EOF
          )"

          curl -L \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${TOKEN}" \
            https://api.github.com/repos/HarrierSecurity/homebrew-ho-azure/dispatches \
            -d "$json_payload"
