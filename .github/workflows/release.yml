name: ho-azure release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Test
        run: go test ./...

      - name: Smoke-test fixtureless execution
        run: |
          set -euo pipefail
          go build -o /tmp/ho-azure ./cmd/azurefox
          /tmp/ho-azure help >/dev/null
          AZUREFOX_PROVIDER=static /tmp/ho-azure whoami --output json >/dev/null

  build:
    runs-on: ubuntu-latest
    needs: validate
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: darwin
            goarch: amd64
            archive_ext: tar.gz
            binary_ext: ""
          - goos: darwin
            goarch: arm64
            archive_ext: tar.gz
            binary_ext: ""
          - goos: linux
            goarch: amd64
            archive_ext: tar.gz
            binary_ext: ""
          - goos: linux
            goarch: arm64
            archive_ext: tar.gz
            binary_ext: ""
          - goos: windows
            goarch: amd64
            archive_ext: zip
            binary_ext: .exe
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          set -euo pipefail
          mkdir -p dist pkg
          binary_name="ho-azure${{ matrix.binary_ext }}"
          package_root="ho-azure-${{ matrix.goos }}-${{ matrix.goarch }}"
          package_dir="pkg/${package_root}"

          go build -trimpath -ldflags="-s -w" -o "${package_dir}/${binary_name}" ./cmd/azurefox
          cp README.md LICENSE CONTRIBUTORS.md SECURITY.md "${package_dir}/"

          if [ "${{ matrix.archive_ext }}" = "zip" ]; then
            (cd pkg && zip -r "../dist/${package_root}.zip" "${package_root}" >/dev/null)
          else
            tar -C pkg -czf "dist/${package_root}.tar.gz" "${package_root}"
          fi

      - name: Upload release artifact
        uses: actions/upload-artifact@v7
        with:
          name: release-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*
          if-no-files-found: error
          retention-days: 1

  verify-ubuntu-x64:
    name: Verify Ubuntu LTS x64 runtime
    runs-on: ubuntu-24.04
    needs:
      - build
    permissions:
      contents: read
    steps:
      - name: Download Linux amd64 artifact
        uses: actions/download-artifact@v8
        with:
          name: release-linux-amd64
          path: dist

      - name: Extract and smoke-test released binary
        run: |
          set -euo pipefail
          mkdir -p extracted
          tar -xzf dist/ho-azure-linux-amd64.tar.gz -C extracted
          binary="./extracted/ho-azure-linux-amd64/ho-azure"
          chmod +x "$binary"
          "$binary" help >/dev/null
          AZUREFOX_PROVIDER=static "$binary" whoami --output json >/dev/null

  verify-linux-x64-containers:
    name: Verify ${{ matrix.target_name }} runtime
    runs-on: ubuntu-latest
    needs:
      - build
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - target_name: Debian stable x64
            image: debian:stable-slim
          - target_name: Kali rolling x64
            image: kalilinux/kali-rolling
    steps:
      - name: Download Linux amd64 artifact
        uses: actions/download-artifact@v8
        with:
          name: release-linux-amd64
          path: dist

      - name: Extract released binary
        run: |
          set -euo pipefail
          mkdir -p extracted
          tar -xzf dist/ho-azure-linux-amd64.tar.gz -C extracted

      - name: Smoke-test released binary in target container
        run: |
          set -euo pipefail
          binary_path="${PWD}/extracted/ho-azure-linux-amd64/ho-azure"
          chmod +x "$binary_path"
          docker run --rm \
            -v "$binary_path:/usr/local/bin/ho-azure:ro" \
            --entrypoint /usr/local/bin/ho-azure \
            "${{ matrix.image }}" help >/dev/null
          docker run --rm \
            -e AZUREFOX_PROVIDER=static \
            -v "$binary_path:/usr/local/bin/ho-azure:ro" \
            --entrypoint /usr/local/bin/ho-azure \
            "${{ matrix.image }}" whoami --output json >/dev/null

  verify-ubuntu-arm64:
    name: Verify Ubuntu LTS arm64 runtime
    runs-on: ubuntu-24.04-arm
    needs:
      - build
    permissions:
      contents: read
    steps:
      - name: Download Linux arm64 artifact
        uses: actions/download-artifact@v8
        with:
          name: release-linux-arm64
          path: dist

      - name: Extract and smoke-test released binary
        run: |
          set -euo pipefail
          mkdir -p extracted
          tar -xzf dist/ho-azure-linux-arm64.tar.gz -C extracted
          binary="./extracted/ho-azure-linux-arm64/ho-azure"
          chmod +x "$binary"
          "$binary" help >/dev/null
          AZUREFOX_PROVIDER=static "$binary" whoami --output json >/dev/null

  verify-windows-x64:
    name: Verify Windows x64 runtime
    runs-on: windows-2022
    needs:
      - build
    permissions:
      contents: read
    steps:
      - name: Download Windows amd64 artifact
        uses: actions/download-artifact@v8
        with:
          name: release-windows-amd64
          path: dist

      - name: Extract and smoke-test released binary
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          New-Item -ItemType Directory -Path extracted | Out-Null
          Expand-Archive -Path "dist/ho-azure-windows-amd64.zip" -DestinationPath extracted
          $binary = ".\extracted\ho-azure-windows-amd64\ho-azure.exe"
          & $binary help | Out-Null
          $env:AZUREFOX_PROVIDER = "static"
          & $binary whoami --output json | Out-Null

  publish-release-containers:
    name: Publish ${{ matrix.target_name }} release container
    runs-on: ubuntu-latest
    needs:
      - build
      - verify-ubuntu-x64
      - verify-linux-x64-containers
      - verify-ubuntu-arm64
      - verify-windows-x64
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - target_name: Debian stable x64
            flavor: debian
            base_image: debian:stable-slim
          - target_name: Kali rolling x64
            flavor: kali
            base_image: kalilinux/kali-rolling
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download Linux amd64 artifact
        uses: actions/download-artifact@v8
        with:
          name: release-linux-amd64
          path: dist

      - name: Prepare container build context
        run: |
          set -euo pipefail
          context_dir="${RUNNER_TEMP}/container-${{ matrix.flavor }}"
          mkdir -p "$context_dir"
          tar -xzf dist/ho-azure-linux-amd64.tar.gz -C "$context_dir"
          cp "$context_dir/ho-azure-linux-amd64/ho-azure" "$context_dir/ho-azure"
          cp packaging/container/Dockerfile.release-linux "$context_dir/Dockerfile"
          chmod +x "$context_dir/ho-azure"
          echo "CONTEXT_DIR=$context_dir" >> "$GITHUB_ENV"

      - name: Build and smoke-test release container
        run: |
          set -euo pipefail
          owner="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          image="ghcr.io/${owner}/ho-azure-${{ matrix.flavor }}"
          version_tag="${GITHUB_REF_NAME}"
          docker build \
            --build-arg BASE_IMAGE=${{ matrix.base_image }} \
            -t "${image}:${version_tag}" \
            -t "${image}:latest" \
            "$CONTEXT_DIR"
          docker run --rm "${image}:${version_tag}" help >/dev/null
          docker run --rm -e AZUREFOX_PROVIDER=static "${image}:${version_tag}" whoami --output json >/dev/null
          echo "IMAGE_NAME=$image" >> "$GITHUB_ENV"
          echo "IMAGE_TAG=$version_tag" >> "$GITHUB_ENV"

      - name: Login to GHCR
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          echo "$GITHUB_TOKEN" | docker login ghcr.io -u "${GITHUB_ACTOR}" --password-stdin

      - name: Push release container
        run: |
          set -euo pipefail
          docker push "${IMAGE_NAME}:${IMAGE_TAG}"
          docker push "${IMAGE_NAME}:latest"

  github-release:
    runs-on: ubuntu-latest
    needs:
      - build
      - verify-ubuntu-x64
      - verify-linux-x64-containers
      - verify-ubuntu-arm64
      - verify-windows-x64
      - publish-release-containers
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download release artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: release-*
          path: dist
          merge-multiple: true

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          shasum -a 256 dist/* > dist/SHA256SUMS
          assets=(dist/*)
          if [ "${#assets[@]}" -eq 0 ]; then
            echo "No release assets found in dist/" >&2
            exit 1
          fi

          owner="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          release_header_file="$(mktemp)"
          generated_notes_file="$(mktemp)"
          final_notes_file="$(mktemp)"

          cat >"$release_header_file" <<EOF
          ## Runtime-verified containers

          - Debian stable x64: \`docker pull ghcr.io/${owner}/ho-azure-debian:${GITHUB_REF_NAME}\`
          - Kali rolling x64: \`docker pull ghcr.io/${owner}/ho-azure-kali:${GITHUB_REF_NAME}\`

          These OCI images are built from the released Linux amd64 artifact and smoke-tested with \`ho-azure help\` plus \`AZUREFOX_PROVIDER=static ho-azure whoami --output json\`.

          EOF

          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" "${assets[@]}" --clobber
            gh release view "${GITHUB_REF_NAME}" --json body --jq .body >"$generated_notes_file"
            if grep -Fq "## Runtime-verified containers" "$generated_notes_file"; then
              gh release edit "${GITHUB_REF_NAME}" --title "${GITHUB_REF_NAME}" --verify-tag
            else
              cat "$release_header_file" "$generated_notes_file" >"$final_notes_file"
              gh release edit "${GITHUB_REF_NAME}" \
                --title "${GITHUB_REF_NAME}" \
                --notes-file "$final_notes_file" \
                --verify-tag
            fi
          else
            gh api \
              -X POST \
              "repos/${GITHUB_REPOSITORY}/releases/generate-notes" \
              -f tag_name="${GITHUB_REF_NAME}" \
              -f target_commitish="${GITHUB_SHA}" \
              --jq .body >"$generated_notes_file"
            cat "$release_header_file" "$generated_notes_file" >"$final_notes_file"
            gh release create "${GITHUB_REF_NAME}" "${assets[@]}" \
              --notes-file "$final_notes_file" \
              --title "${GITHUB_REF_NAME}" \
              --verify-tag
          fi
